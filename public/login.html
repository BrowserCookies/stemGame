<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — STEM Game</title>
  <style>
    :root {
      --bg:         #080c14;
      --surface:    #0f1523;
      --border:     #1e2d45;
      --primary:    #3b82f6;
      --primary-dk: #2563eb;
      --accent:     #00d4ff;
      --text:       #e2e8f0;
      --muted:      #64748b;
      --error:      #f87171;
      --error-bg:   rgba(248,113,113,0.08);
      --error-bd:   rgba(248,113,113,0.28);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* NAV */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 60px;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 18px; font-weight: 800; text-decoration: none; color: var(--text); }
    .logo span { color: var(--accent); }
    .nav-link { font-size: 13px; color: var(--muted); text-decoration: none; }
    .nav-link:hover { color: var(--text); }

    /* MAIN */
    .page {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px; position: relative; overflow: hidden;
    }
    .page::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(59,130,246,0.08) 1px, transparent 1px);
      background-size: 32px 32px; pointer-events: none;
    }
    .page::after {
      content: '';
      position: absolute; top: -120px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(59,130,246,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    /* CARD */
    .card {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 40px;
      width: 100%; max-width: 420px;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title    { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    .card-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    .form-group { margin-bottom: 18px; }
    label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--muted); margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 7px; padding: 11px 14px;
      font-size: 14px; color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    input::placeholder { color: var(--muted); opacity: 0.55; }

    .submit-btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 12px;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; border: none;
      background: var(--primary); color: #fff;
      margin-top: 8px; transition: all 0.18s;
    }
    .submit-btn:hover:not(:disabled) {
      background: var(--primary-dk);
      box-shadow: 0 0 24px rgba(59,130,246,0.4);
    }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-box {
      display: none;
      background: var(--error-bg); border: 1px solid var(--error-bd);
      color: var(--error); padding: 10px 14px; border-radius: 7px;
      font-size: 13px; margin-bottom: 18px;
    }
    .error-box.show { display: block; }

    .footer-note {
      text-align: center; margin-top: 24px;
      font-size: 13px; color: var(--muted);
    }
    .footer-note a { color: #93c5fd; text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.55s linear infinite; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .nav { padding: 0 20px; }
      .card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="logo">STEM<span>Game</span></a>
    <a href="/register.html" class="nav-link">No account? Sign up →</a>
  </nav>

  <main class="page">
    <div class="card">
      <h1 class="card-title">Welcome back</h1>
      <p class="card-subtitle">Log in to continue your learning journey</p>

      <div class="error-box" id="errorBox"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="identifier">Username or Email</label>
          <input id="identifier" type="text" placeholder="your_username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Log In</button>
      </form>

      <div class="footer-note">
        Don't have an account? <a href="/register.html">Sign up for free</a>
      </div>
    </div>
  </main>

  <script>
    const form      = document.getElementById('loginForm');
    const errorBox  = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');

    function setLoading(on) {
      submitBtn.disabled = on;
      submitBtn.innerHTML = on ? '<span class="spinner"></span>Logging in…' : 'Log In';
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('show');
      setLoading(true);

      const identifier = document.getElementById('identifier').value.trim();
      const password   = document.getElementById('password').value;

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.message || 'Login failed. Please try again.');
          return;
        }

        localStorage.setItem('authToken', data.token);
        localStorage.setItem('authUser',  JSON.stringify(data.user));
        window.location.href = '/wizard.html';
      } catch {
        showError('Network error. Please check your connection.');
      } finally {
        setLoading(false);
      }
    });
  </script>

</body>
</html>
